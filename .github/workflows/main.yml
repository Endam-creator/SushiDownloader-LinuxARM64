name: Build SushiScan ARM64

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Permet de lancer la compilation manuellement

jobs:
  build-arm64:
    # IMPORTANT : 'self-hosted' indique à GitHub d'utiliser ton Raspberry Pi
    runs-on: self-hosted

    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4

      - name: 🐍 Configuration de l'environnement Python
        run: |
          # On force l'installation car le runner est un environnement de build dédié
          python3 -m pip install --upgrade pip --break-system-packages
          pip install pillow img2pdf selenium pyinstaller --break-system-packages

      - name: 🛠️ Compilation avec PyInstaller (ARM64)
        run: |
          rm -rf build dist
          # On s'assure que pyinstaller est dans le PATH ou on l'appelle via python3 -m
          python3 -m PyInstaller --noconfirm --onefile --windowed \
          --name "SushiApp_ARM64" \
          main.py

      - name: 📦 Archivage du binaire ARM64
        uses: actions/upload-artifact@v4
        with:
          name: SushiApp_ARM64_Executable
          path: dist/SushiApp_ARM64
          if-no-files-found: error
